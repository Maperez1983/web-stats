  <text x="70" y="111" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8.2" font-weight="700" letter-spacing="2.8" fill="#ffffff">ESPAÑOLA FÚTBOL</text>
  <text x="52" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#ffffff">R</text>
  <text x="88" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#ffffff">F</text>
  <text x="52" y="93" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#ffffff">E</text>
  <text x="88" y="93" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#ffffff">F</text>
  <circle cx="70" cy="70" r="3.5" fill="#ffffff" />
