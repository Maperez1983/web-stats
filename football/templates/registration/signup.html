{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crear cuenta · 2J Football Intelligence</title>
    <style>
      :root {
        --bg: #08111d;
        --panel: linear-gradient(180deg, rgba(16, 25, 42, 0.94), rgba(10, 17, 29, 0.96));
        --line: rgba(244, 180, 0, 0.16);
        --text: #f5f7fa;
        --muted: #91a1b9;
        --pitch: #2f7d32;
        --amber: #f4b400;
        --shadow: 0 30px 72px rgba(0, 0, 0, 0.38);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--text);
        font-family: "Avenir Next", "Inter", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(47, 125, 50, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(244, 180, 0, 0.15), transparent 24%),
          linear-gradient(180deg, #060d18, #08111d 56%, #050a13);
      }
      .card {
        width: min(460px, 100%);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        padding: 1.2rem;
        box-shadow: var(--shadow);
      }
      .brand {
        display: grid;
        gap: 0.8rem;
        margin-bottom: 1.05rem;
      }
      .brand img {
        width: 196px;
        max-width: 100%;
        height: auto;
      }
      .brand-badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(244, 180, 0, 0.22);
        background: linear-gradient(135deg, rgba(244, 180, 0, 0.12), rgba(47, 125, 50, 0.08));
        color: #fff7dd;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: 1.16rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .brand p {
        color: var(--muted);
      }
      p { margin: 0.45rem 0; }
      label {
        display: block;
        margin: 0.7rem 0 0.35rem;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(245, 247, 250, 0.8);
      }
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(18, 28, 48, 0.72);
        color: var(--text);
        padding: 0.62rem 0.65rem;
      }
      .pill-button {
        width: 100%;
        margin-top: 0.95rem;
        border: none;
        border-radius: 999px;
        padding: 0.7rem;
        background: linear-gradient(135deg, var(--amber), var(--pitch));
        color: #081320;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .ghost-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: 0.75rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        border: 1px solid rgba(122, 135, 151, 0.28);
        color: #d7dee8;
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.03);
      }
      .error {
        color: #fecaca;
        border: 1px solid rgba(248, 113, 113, 0.45);
        background: rgba(127, 29, 29, 0.35);
        border-radius: 10px;
        padding: 0.5rem 0.6rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="{% static 'football/images/2j-mark.svg' %}" alt="2J Football Intelligence" />
        <div>
          <div class="brand-badge">2J Football Intelligence</div>
          <h1>Crear cuenta</h1>
          <p>Acceso de club (beta)</p>
        </div>
      </div>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_club_name">Nombre del club</label>
        <input id="id_club_name" type="text" name="club_name" required value="{{ form.club_name|default:'' }}" autocomplete="organization" />

        <label for="id_email">Email</label>
        <input id="id_email" type="email" name="email" required value="{{ form.email|default:'' }}" autocomplete="email" />

        <label for="id_password">Contraseña</label>
        <input id="id_password" type="password" name="password" required autocomplete="new-password" />

        <label for="id_password_confirm">Repite contraseña</label>
        <input id="id_password_confirm" type="password" name="password_confirm" required autocomplete="new-password" />

        <button class="pill-button" type="submit">Crear</button>
        <a class="ghost-link" href="{% url 'login' %}">Ya tengo cuenta</a>
        <p style="margin-top:0.75rem;color:rgba(145,161,185,0.82);font-size:0.72rem;line-height:1.4;">
          Al crear la cuenta aceptas los
          <a href="{% url 'terms-page' %}" style="color:rgba(244,180,0,0.95);text-decoration:none;">términos</a>
          y la
          <a href="{% url 'privacy-policy' %}" style="color:rgba(244,180,0,0.95);text-decoration:none;">política de privacidad</a>.
          Soporte: <a href="{% url 'support-page' %}" style="color:rgba(244,180,0,0.95);text-decoration:none;">contacto</a>.
        </p>
      </form>
    </main>
  </body>
</html>
