{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso · 2J Football Intelligence</title>
    <style>
      :root {
        --bg: #08111d;
        --panel: linear-gradient(180deg, rgba(16, 25, 42, 0.94), rgba(10, 17, 29, 0.96));
        --line: rgba(244, 180, 0, 0.16);
        --text: #f5f7fa;
        --muted: #91a1b9;
        --pitch: #2f7d32;
        --amber: #f4b400;
        --shadow: 0 30px 72px rgba(0, 0, 0, 0.38);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--text);
        font-family: "Avenir Next", "Inter", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(47, 125, 50, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(244, 180, 0, 0.15), transparent 24%),
          linear-gradient(180deg, #060d18, #08111d 56%, #050a13);
      }
      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        padding: 1.2rem;
        box-shadow: var(--shadow);
      }
      .brand {
        display: grid;
        gap: 0.8rem;
        margin-bottom: 1.05rem;
      }
      .brand img {
        width: 196px;
        max-width: 100%;
        height: auto;
      }
      .brand-badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        border: 1px solid rgba(244, 180, 0, 0.22);
        background: linear-gradient(135deg, rgba(244, 180, 0, 0.12), rgba(47, 125, 50, 0.08));
        color: #fff7dd;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: 1.16rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .brand p {
        color: var(--muted);
      }
      p { margin: 0.45rem 0; }
      label {
        display: block;
        margin: 0.7rem 0 0.35rem;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(245, 247, 250, 0.8);
      }
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(18, 28, 48, 0.72);
        color: var(--text);
        padding: 0.62rem 0.65rem;
      }
      .password-wrap {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .password-wrap input {
        flex: 1;
      }
      .icon-btn {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 10px;
        min-width: 40px;
        height: 40px;
        cursor: pointer;
      }
      .pill-button {
        width: 100%;
        margin-top: 0.95rem;
        border: none;
        border-radius: 999px;
        padding: 0.7rem;
        background: linear-gradient(135deg, var(--amber), var(--pitch));
        color: #081320;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .ghost-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: 0.75rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        border: 1px solid rgba(122, 135, 151, 0.28);
        color: #d7dee8;
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.03);
      }
      .error {
        color: #fecaca;
        border: 1px solid rgba(248, 113, 113, 0.45);
        background: rgba(127, 29, 29, 0.35);
        border-radius: 10px;
        padding: 0.5rem 0.6rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="{% static 'football/images/2j-mark.svg' %}" alt="2J Football Intelligence" />
        <div>
          <div class="brand-badge">2J Football Intelligence</div>
          <h1>Acceso 2J</h1>
          <p>Football Intelligence · Del partido al entrenamiento.</p>
        </div>
      </div>

      {% if form.errors %}
      <p class="error">Credenciales inválidas o usuario sin permisos de acceso.</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Usuario</label>
        <input id="id_username" type="text" name="username" required autocomplete="username" />

        <label for="id_password">Contraseña</label>
        <div class="password-wrap">
          <input id="id_password" type="password" name="password" required autocomplete="current-password" />
          <button type="button" class="icon-btn" data-toggle-password="#id_password" aria-label="Mostrar u ocultar contraseña" title="Mostrar / ocultar">👁</button>
        </div>
        <button class="pill-button" type="submit">Entrar</button>
        <a class="ghost-link" href="{% url 'product-landing' %}">Conocer 2J</a>
      </form>
    </main>

    <script>
      document.querySelectorAll('[data-toggle-password]').forEach((button) => {
        button.addEventListener('click', () => {
          const selector = button.getAttribute('data-toggle-password');
          const input = selector ? document.querySelector(selector) : null;
          if (!input) return;
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });
    </script>
  </body>
</html>
