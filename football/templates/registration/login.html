{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso · Web Stats</title>
    <style>
      :root {
        --bg: #050b16;
        --panel: rgba(7, 16, 30, 0.92);
        --line: rgba(121, 170, 230, 0.28);
        --text: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        background: radial-gradient(circle at top, #111827, #030712 55%);
      }
      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 1rem;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.7rem;
      }
      .brand img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }
      h1 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      p { margin: 0.45rem 0; }
      label {
        display: block;
        margin: 0.7rem 0 0.35rem;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(205, 225, 255, 0.85);
      }
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(9, 20, 36, 0.72);
        color: var(--text);
        padding: 0.62rem 0.65rem;
      }
      .password-wrap {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .password-wrap input {
        flex: 1;
      }
      .icon-btn {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 10px;
        min-width: 40px;
        height: 40px;
        cursor: pointer;
      }
      .pill-button {
        width: 100%;
        margin-top: 0.95rem;
        border: none;
        border-radius: 999px;
        padding: 0.7rem;
        background: linear-gradient(135deg, #14d8ff, #4f46e5);
        color: #f8fbff;
        font-weight: 700;
        cursor: pointer;
      }
      .error {
        color: #fecaca;
        border: 1px solid rgba(248, 113, 113, 0.45);
        background: rgba(127, 29, 29, 0.35);
        border-radius: 10px;
        padding: 0.5rem 0.6rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="{% static 'logos/logo.png' %}" alt="Escudo C.D. Benagalbón" />
        <h1>Acceso Web Stats</h1>
      </div>

      {% if form.errors %}
      <p class="error">Credenciales inválidas o usuario sin permisos de acceso.</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">Usuario</label>
        <input id="id_username" type="text" name="username" required autocomplete="username" />

        <label for="id_password">Contraseña</label>
        <div class="password-wrap">
          <input id="id_password" type="password" name="password" required autocomplete="current-password" />
          <button type="button" class="icon-btn" data-toggle-password="#id_password" aria-label="Mostrar u ocultar contraseña" title="Mostrar / ocultar">👁</button>
        </div>
        <button class="pill-button" type="submit">Entrar</button>
      </form>
    </main>

    <script>
      document.querySelectorAll('[data-toggle-password]').forEach((button) => {
        button.addEventListener('click', () => {
          const selector = button.getAttribute('data-toggle-password');
          const input = selector ? document.querySelector(selector) : null;
          if (!input) return;
          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });
    </script>
  </body>
</html>
