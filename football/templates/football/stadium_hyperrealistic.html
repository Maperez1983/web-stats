{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Estadio 3D · Benagalbon CD</title>
    <script type="importmap">
      {
        "imports": {
          "three": "{% static 'vendor/three/build/three.module.js' %}"
        }
      }
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05080b;
        font-family: "Avenir Next", Inter, system-ui, sans-serif;
      }

      #stadium-root {
        position: fixed;
        inset: 0;
        background: #05080b;
      }

      #stadium-root canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .stadium-hud {
        position: fixed;
        left: max(18px, env(safe-area-inset-left));
        right: max(18px, env(safe-area-inset-right));
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 2;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        color: #f7fbff;
        pointer-events: none;
      }

      .stadium-title {
        max-width: min(520px, 72vw);
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.78);
      }

      .stadium-title strong {
        display: block;
        font-size: clamp(1.2rem, 2.3vw, 2.05rem);
        letter-spacing: 0;
      }

      .stadium-title span {
        display: block;
        margin-top: 4px;
        color: rgba(234, 244, 255, 0.78);
        font-size: clamp(0.78rem, 1.3vw, 0.95rem);
      }

      .stadium-controls {
        display: flex;
        gap: 8px;
        pointer-events: auto;
      }

      .stadium-controls button {
        min-width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(7, 11, 16, 0.58);
        color: #f8fbff;
        font: 700 13px/1 system-ui, sans-serif;
        backdrop-filter: blur(12px);
        cursor: pointer;
      }

      .stadium-loading {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: grid;
        place-items: center;
        color: #e9f2ff;
        background: radial-gradient(circle at 50% 35%, rgba(25, 100, 59, 0.28), transparent 34%), #05080b;
        transition: opacity 360ms ease, visibility 360ms ease;
      }

      .stadium-loading.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .stadium-loading span {
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(8, 13, 20, 0.58);
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.38);
      }

      @media (max-width: 720px) {
        .stadium-hud {
          align-items: flex-start;
          flex-direction: column;
          top: max(14px, env(safe-area-inset-top));
          bottom: auto;
        }

        .stadium-title {
          max-width: 92vw;
        }
      }
    </style>
  </head>
  <body>
    <main
      id="stadium-root"
      data-model-src="{% static 'football/models/stadium/benagalbon-hyperrealistic-stadium.glb' %}?v=stadium-render-15"
      data-crest-src="{% static 'football/images/cdb-benagalbon-crest.png' %}"
      data-twoj-src="{% static 'football/images/2j-mark.svg' %}"
    ></main>
    <div class="stadium-loading" id="stadium-loading"><span>Construyendo estadio 3D</span></div>
    <div class="stadium-hud">
      <div class="stadium-title">
        <strong>BENAGALBON CD</strong>
        <span>Estadio hiperrealista procedural · camara libre 3D</span>
      </div>
      <div class="stadium-controls" aria-label="Controles de camara">
        <button type="button" data-camera="broadcast" title="Camara television">TV</button>
        <button type="button" data-camera="aerial" title="Camara aerea">AIR</button>
        <button type="button" data-camera="touchline" title="Camara banda">LINE</button>
      </div>
    </div>
    <script type="module" src="{% static 'football/js/stadium_hyperrealistic.js' %}?v=blender-stadium-14"></script>
  </body>
</html>
