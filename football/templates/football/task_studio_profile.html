<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Perfil e identidad · Task Studio</title>
    <style>
      :root { --bg:#081320; --panel:#102235; --line:rgba(255,255,255,.12); --ink:#eef2f7; --muted:rgba(226,232,240,.7); }
      * { box-sizing:border-box; }
      body { margin:0; background:linear-gradient(180deg,#07111c,#0c1f33); color:var(--ink); font-family:"Montserrat","Segoe UI",sans-serif; }
      .page { max-width:980px; margin:0 auto; padding:1.1rem; }
      .nav, .actions, .grid { display:grid; gap:.8rem; }
      .nav { grid-template-columns:repeat(3,max-content); margin-bottom:1rem; }
      .panel { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:1rem; margin-bottom:.9rem; }
      .fields { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:.8rem; }
      label { display:grid; gap:.3rem; font-size:.74rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
      input { width:100%; padding:.72rem .82rem; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--ink); font:inherit; }
      .button, button { display:inline-flex; align-items:center; justify-content:center; padding:.62rem .9rem; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink); text-decoration:none; font:inherit; font-size:.76rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
      button.primary { background:#f8fafc; color:#081320; border:none; }
      .msg { padding:.75rem .9rem; border-radius:14px; margin-bottom:.8rem; border:1px solid var(--line); }
      .ok { background:rgba(22,163,74,.16); border-color:rgba(74,222,128,.35); }
      .err { background:rgba(127,29,29,.24); border-color:rgba(248,113,113,.35); }
      .crest { width:84px; height:84px; object-fit:contain; border-radius:14px; background:#fff; padding:.35rem; border:1px solid var(--line); }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 style="margin:0 0 .35rem; font-size:1.15rem; letter-spacing:.08em; text-transform:uppercase;">Perfil e identidad</h1>
      <p style="margin:0 0 1rem; color:rgba(226,232,240,.7);">{{ target_user.get_username }}</p>
      <div class="nav">
        <a class="button" href="{% url 'task-studio-home' %}{{ query_suffix }}">Inicio</a>
        <a class="button" href="{% url 'task-studio-profile' %}{{ query_suffix }}">Perfil e identidad</a>
        <a class="button" href="{% url 'task-studio-roster' %}{{ query_suffix }}">Plantilla</a>
      </div>
      {% if feedback %}<div class="msg ok">{{ feedback }}</div>{% endif %}
      {% if error %}<div class="msg err">{{ error }}</div>{% endif %}
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <section class="panel">
          <h2 style="margin:0 0 .8rem; font-size:.84rem; letter-spacing:.1em; text-transform:uppercase;">Datos del entrenador</h2>
          <div class="fields">
            <label>Nombre documental<input type="text" name="document_name" value="{{ profile.document_name }}" /></label>
            <label>Nombre visible<input type="text" name="display_name" value="{{ profile.display_name }}" /></label>
            <label>Licencia / titulación<input type="text" name="license_name" value="{{ profile.license_name }}" /></label>
            <label>Teléfono<input type="text" name="phone" value="{{ profile.phone }}" /></label>
            <label>Club / academia<input type="text" name="club_name" value="{{ profile.club_name }}" /></label>
            <label>Categoría<input type="text" name="category_label" value="{{ profile.category_label }}" /></label>
            <label>Ciudad<input type="text" name="city" value="{{ profile.city }}" /></label>
            <label>Firma<input type="text" name="signature" value="{{ profile.signature }}" /></label>
            <label style="grid-column:1 / -1;">Pie de documento<input type="text" name="document_footer" value="{{ profile.document_footer }}" /></label>
          </div>
        </section>
        <section class="panel">
          <h2 style="margin:0 0 .8rem; font-size:.84rem; letter-spacing:.1em; text-transform:uppercase;">Identidad visual</h2>
          <div class="fields">
            <label>Color principal<input type="text" name="primary_color" value="{{ profile.primary_color }}" /></label>
            <label>Color secundario<input type="text" name="secondary_color" value="{{ profile.secondary_color }}" /></label>
            <label>Color acento<input type="text" name="accent_color" value="{{ profile.accent_color }}" /></label>
            <label>Escudo<input type="file" name="crest_image" accept="image/*" /></label>
          </div>
          {% if profile.crest_image %}
          <div style="margin-top:.85rem;"><img class="crest" src="{{ profile.crest_image.url }}" alt="Escudo" /></div>
          {% endif %}
        </section>
        <div class="actions">
          <button class="primary" type="submit">Guardar perfil</button>
        </div>
      </form>
    </main>
  </body>
</html>
