{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>{{ title|default:"PDF" }} · 2J</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/css/commercial.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    {% include 'football/pwa_head.html' %}
    <style>
      body { margin: 0; background: linear-gradient(180deg, #020417 0%, #050b1c 100%); color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
      .page { max-width: 1080px; margin: 0 auto; padding: 1rem 1rem 2rem; }
      .head { display:flex; justify-content:space-between; gap:0.8rem; flex-wrap:wrap; align-items:center; }
      .head h1 { margin:0; letter-spacing:0.08em; font-size:0.95rem; text-transform:uppercase; }
      .meta { color: rgba(226, 232, 240, 0.72); font-weight: 800; }
      .card { margin-top: 0.9rem; background: rgba(12, 20, 34, 0.92); border: 1px solid rgba(145, 161, 185, 0.18); border-radius: 22px; box-shadow: 0 22px 52px rgba(0,0,0,0.28); padding: 0.9rem; }
      .btn { border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color:#f3f7ff; padding:0.7rem 0.95rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; }
      .btn.primary { background: linear-gradient(135deg, #22d3ee, #67e8f9); border:none; color:#03253c; }
      .btn.ghost { background: transparent; }
      iframe { width: 100%; height: 74vh; border: 1px solid rgba(148,163,184,0.18); border-radius: 18px; background: rgba(0,0,0,0.22); }
      @media (max-width: 900px) { iframe { height: 78vh; } }
    </style>
  </head>
  <body class="prod-commercial">
    <main class="page">
      <div class="head">
        <div style="display:flex; flex-direction:column; gap:0.15rem;">
          <h1>{{ title|default:"PDF" }}</h1>
          <div class="meta">2J · Visor PDF</div>
        </div>
        <div style="display:flex; gap:0.45rem; flex-wrap:wrap;">
          <a class="btn ghost" href="{{ back_url|default:'/' }}">Volver</a>
          <a class="btn primary" href="{{ pdf_url }}" target="_blank" rel="noopener">Abrir</a>
          <a class="btn" href="{{ pdf_url }}" download>Descargar</a>
        </div>
      </div>

      <section class="card">
        <iframe src="{{ pdf_url }}" title="{{ title|default:'PDF' }}"></iframe>
        <div class="meta" style="margin-top:0.65rem;">
          Si el PDF tarda, espera unos segundos. Si no carga, usa “Abrir” o “Descargar”.
        </div>
      </section>
    </main>
    <script>
      (() => {
        const backLink = document.querySelector('a[href][class*="ghost"]');
        if (!backLink) return;
        backLink.addEventListener('click', (event) => {
          // En webviews puede venir sin historial; priorizamos back_url.
          const href = backLink.getAttribute('href') || '';
          event.preventDefault();
          try {
            if (window.history && window.history.length > 1) {
              window.history.back();
              // Si no vuelve (historial inconsistente), hacemos fallback al back_url.
              window.setTimeout(() => { try { window.location.href = href; } catch (e) {} }, 350);
              return;
            }
          } catch (e) {}
          try { window.location.href = href; } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
