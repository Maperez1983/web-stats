{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Playlist (YouTube) · Mis vídeos</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/css/commercial.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    {% include 'football/pwa_head.html' %}
    <style>
      body { margin:0; background: linear-gradient(180deg, #020417 0%, #050b1c 100%); color:#f8fafc; font-family: Inter, system-ui, sans-serif; }
      .page { max-width: 1200px; margin:0 auto; padding: 1.1rem; }
      .card { background: rgba(12, 20, 34, 0.92); border: 1px solid rgba(145, 161, 185, 0.18); border-radius: 22px; box-shadow: 0 22px 52px rgba(0,0,0,0.28); padding: 0.95rem; }
      .grid { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 1rem; align-items:start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      h1 { margin:0; font-size:1.05rem; letter-spacing:0.08em; text-transform:uppercase; }
      .meta { color: rgba(226,232,240,0.72); font-weight:800; margin-top:0.25rem; }
      .button { border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color:#f3f7ff; padding:0.72rem 0.98rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
      .button.primary { background: linear-gradient(135deg, #22d3ee, #67e8f9); border:none; color:#03253c; }
      .row { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; padding:0.65rem 0.75rem; border-radius: 16px; border:1px solid rgba(148,163,184,0.14); background: rgba(255,255,255,0.03); }
      .row strong { font-weight:900; }
      .row small { color: rgba(226,232,240,0.7); font-weight:800; }
      .list { display:grid; gap:0.45rem; margin-top:0.6rem; }
      .stage { position:relative; width:100%; border-radius: 18px; overflow:hidden; border: 1px solid rgba(148,163,184,0.18); background: rgba(0,0,0,0.22); }
      .stage-inner { width:100%; aspect-ratio: 16 / 9; }
      .stage-inner iframe { width:100%; height:100%; border:0; }
      .status { margin-top:0.55rem; color: rgba(226,232,240,0.72); font-weight:800; }
      .msg { white-space: pre-wrap; color: rgba(226,232,240,0.86); font-weight:750; margin-top:0.55rem; }
    </style>
  </head>
  <body class="prod-commercial">
    <main class="page">
      <div class="card" style="margin-bottom:1rem;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:0.8rem; flex-wrap:wrap;">
          <div>
            <h1>Playlist (YouTube)</h1>
            <div class="meta">{{ video.title|default:"Vídeo" }}</div>
            {% if inbox_item and inbox_item.message %}
              <div class="msg">{{ inbox_item.message }}</div>
            {% endif %}
          </div>
          <div style="display:flex; gap:0.55rem; flex-wrap:wrap;">
            <a class="button" href="{% if back_url %}{{ back_url }}{% else %}{% url 'player-video-inbox' %}{% endif %}">Mis vídeos</a>
            <button type="button" class="button primary" id="pl-playall">Play lista</button>
            <button type="button" class="button" id="pl-stop">Stop</button>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card">
          <div class="stage">
            <div class="stage-inner">
              <iframe
                id="pl-iframe"
                title="YouTube"
                src=""
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
                referrerpolicy="strict-origin-when-cross-origin"
              ></iframe>
            </div>
          </div>
          <div class="status" id="pl-status">Selecciona un clip.</div>
        </section>
        <aside class="card">
          <div class="meta" style="font-weight:900; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.35rem;">Clips</div>
          <div class="list" id="pl-list"></div>
        </aside>
      </div>

      <script>
        (function () {
          var dataEl = document.getElementById('pl-clips');
          var clips = [];
          try { clips = JSON.parse(dataEl?.textContent || '[]') || []; } catch (e) { clips = []; }
          var iframe = document.getElementById('pl-iframe');
          var status = document.getElementById('pl-status');
          var clipsEl = document.getElementById('pl-list');
          var btnPlayAll = document.getElementById('pl-playall');
          var btnStop = document.getElementById('pl-stop');
          var active = false;
          var idx = 0;

          function safeText(v, fallback) {
            var s = String(v == null ? '' : v).trim();
            return s || (fallback || '');
          }
          function fmt(s) {
            var n = Math.max(0, Number(s) || 0);
            var mm = Math.floor(n / 60);
            var ss = Math.floor(n % 60);
            return String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
          }
          function setStatus(msg) { if (status) status.textContent = safeText(msg, ''); }
          function escapeHtml(value) {
            return String(value == null ? '' : value)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;');
          }
          function setSrc(url) {
            if (!iframe) return;
            iframe.src = safeText(url, '');
          }
          function stop() {
            active = false;
            setSrc('');
            setStatus('Parado.');
          }
          function playIndex(i) {
            var c = clips[i] || {};
            idx = i;
            var url = safeText(c.embed_url, '');
            if (!url) return;
            setSrc(url);
            setStatus('Clip ' + String(i + 1) + '/' + String(clips.length));
          }
          function render() {
            if (!clipsEl) return;
            if (!clips.length) {
              clipsEl.innerHTML = '<div class="meta">Sin clips.</div>';
              return;
            }
            var html = '';
            for (var i = 0; i < clips.length; i += 1) {
              var c = clips[i] || {};
              var title = safeText(c.title, 'Clip');
              var meta = fmt(c.in_s) + ' → ' + (Number(c.out_s || 0) ? fmt(c.out_s) : '…');
              html += ''
                + '<div class="row">'
                + '  <div style="display:flex; flex-direction:column; gap:0.15rem; min-width:0;">'
                + '    <strong style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + escapeHtml(title) + '</strong>'
                + '    <small>' + escapeHtml(meta) + '</small>'
                + '  </div>'
                + '  <div style="display:flex; gap:0.35rem; flex-wrap:wrap; justify-content:flex-end;">'
                + '    <button type="button" class="button" data-pl-play="' + String(i) + '">Play</button>'
                + '  </div>'
                + '</div>';
            }
            clipsEl.innerHTML = html;
            var btns = clipsEl.querySelectorAll('[data-pl-play]');
            for (var b = 0; b < btns.length; b += 1) {
              (function (btn) {
                btn.addEventListener('click', function () {
                  var i = Number(btn.getAttribute('data-pl-play') || 0) || 0;
                  active = false;
                  playIndex(i);
                });
              })(btns[b]);
            }
          }

          if (btnPlayAll) btnPlayAll.addEventListener('click', function () {
            if (!clips.length) return;
            active = true;
            playIndex(0);
          });
          if (btnStop) btnStop.addEventListener('click', stop);

          render();
          if (clips.length && clips[0] && clips[0].embed_url) setSrc(String(clips[0].embed_url));
        })();
      </script>

      {{ clips|json_script:"pl-clips" }}
    </main>
  </body>
</html>
