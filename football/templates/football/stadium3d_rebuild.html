{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Estadio 3D · Fase 1</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #cfe6f5;
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #stadium3d-root {
        position: fixed;
        inset: 0;
      }

      #stadium3d-root canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        left: 18px;
        bottom: 16px;
        z-index: 3;
        pointer-events: none;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.4);
      }

      .hud strong {
        display: block;
        font-size: 28px;
        line-height: 1;
        letter-spacing: 0;
      }

      .hud span {
        display: block;
        margin-top: 8px;
        font-size: 13px;
        color: rgba(248, 250, 252, 0.78);
      }

      .controls {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 4;
        display: flex;
        gap: 8px;
      }

      .controls button {
        width: 42px;
        height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(8, 13, 18, 0.72);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .controls button.is-active {
        background: rgba(255, 255, 255, 0.18);
      }

      .loading {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        background: #101820;
        color: #f8fafc;
        font-weight: 800;
      }

      .loading.is-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main
      id="stadium3d-root"
      data-model-src="{% static 'football/models/stadium3d/stadium3d_phase1_pitch.glb' %}?v=phase1-001"
    ></main>
    <div id="stadium3d-loading" class="loading">Cargando fase 1</div>
    <div class="hud">
      <strong>BENAGALBON CD</strong>
      <span>Fase 1 · cesped, lineas, porterias y redes</span>
    </div>
    <div class="controls" aria-label="Camara">
      <button type="button" data-camera="tv" class="is-active">TV</button>
      <button type="button" data-camera="air">AIR</button>
      <button type="button" data-camera="goal">NET</button>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "{% static 'vendor/three/build/three.module.js' %}"
        }
      }
    </script>
    <script type="module" src="{% static 'football/js/stadium3d_rebuild.js' %}?v=phase1-001"></script>
  </body>
</html>
