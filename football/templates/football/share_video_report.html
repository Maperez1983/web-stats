{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Informe · 2J</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/css/commercial.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    {% include 'football/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 32%),
          linear-gradient(180deg, #020417 0%, #050b1c 100%);
        color: #f8fafc;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .page { max-width: 980px; margin: 0 auto; padding: 1.2rem 1rem 2.5rem; }
      .head {
        display:flex;
        justify-content:space-between;
        gap:0.8rem;
        flex-wrap:wrap;
        align-items:flex-start;
        padding: 1rem 1.05rem;
        border-radius: 24px;
        border: 1px solid rgba(145, 161, 185, 0.18);
        background: rgba(12, 20, 34, 0.82);
        box-shadow: 0 22px 52px rgba(0,0,0,0.24);
      }
      .head-copy { display:flex; flex-direction:column; gap:0.34rem; max-width: 620px; }
      .head-kicker { color: rgba(125,211,252,0.92); font-size:0.72rem; font-weight:950; letter-spacing:0.18em; text-transform:uppercase; }
      .head h1 { margin:0; font-size:clamp(1.35rem, 2vw, 1.9rem); line-height:1.02; letter-spacing:-0.03em; }
      .meta { color: rgba(226, 232, 240, 0.72); font-weight: 800; }
      .head-pills { display:flex; flex-wrap:wrap; gap:0.45rem; }
      .head-pill { display:inline-flex; align-items:center; gap:0.35rem; padding:0.4rem 0.7rem; border-radius:999px; border:1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color:#f8fafc; font-size:0.72rem; font-weight:900; letter-spacing:0.05em; text-transform:uppercase; }
      .card { margin-top: 1rem; background: rgba(12, 20, 34, 0.92); border: 1px solid rgba(145, 161, 185, 0.18); border-radius: 22px; box-shadow: 0 22px 52px rgba(0,0,0,0.28); padding: 0.95rem; }
      .button { border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color:#f3f7ff; padding:0.72rem 0.98rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease; }
      .button.primary { background: linear-gradient(135deg, #22d3ee, #67e8f9); border:none; color:#03253c; }
      .button:hover { transform: translateY(-1px); border-color: rgba(125,211,252,0.34); background: rgba(255,255,255,0.1); box-shadow: 0 14px 24px rgba(0,0,0,0.18); }
      iframe { width: 100%; height: 70vh; border: 1px solid rgba(148,163,184,0.18); border-radius: 18px; background: rgba(0,0,0,0.22); }
      @media (max-width: 900px) { iframe { height: 72vh; } }
    </style>
  </head>
  <body class="prod-commercial">
    <main class="page">
      <div class="head">
        <div class="head-copy">
          <div class="head-kicker">Compartir informe</div>
          <h1>{{ title|default:"Informe" }}</h1>
          <div class="meta">2J · Video Studio · PDF</div>
          <div class="head-pills">
            <span class="head-pill">Lectura rápida</span>
            <span class="head-pill">Compartible</span>
          </div>
        </div>
        <div style="display:flex; gap:0.45rem; flex-wrap:wrap;">
          <a class="button primary" href="{{ pdf_url }}" target="_blank" rel="noopener">Abrir</a>
          <a class="button" href="{{ pdf_url }}" download>Descargar</a>
        </div>
      </div>

      <section class="card">
        <iframe src="{{ pdf_url }}"></iframe>
        <div class="meta" style="margin-top:0.65rem;">Si el PDF tarda, espera unos segundos. Puedes abrirlo en una pestaña nueva.</div>
      </section>
    </main>
  </body>
</html>
