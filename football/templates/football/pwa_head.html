{% load static %}
<link rel="manifest" href="{% url 'pwa-manifest' %}" />
<meta name="theme-color" content="{% if brand_theme and brand_theme.bg %}{{ brand_theme.bg }}{% else %}#08111d{% endif %}" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="2J" />
<link rel="apple-touch-icon" href="{% static 'football/pwa/icons/icon-180.png' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
<link rel="icon" type="image/png" sizes="192x192" href="{% static 'football/pwa/icons/icon-192.png' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
<link rel="icon" type="image/png" sizes="512x512" href="{% static 'football/pwa/icons/icon-512.png' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
{% if brand_theme and brand_theme.css_vars %}
<style id="brand-theme-vars">
  :root {
  {% for key, value in brand_theme.css_vars.items %}
    {{ key }}: {{ value|safe }};
  {% endfor %}
  }
</style>
{% endif %}
{% if brand_theme and brand_theme.css_vars_light %}
<style id="brand-theme-vars-light">
  :root[data-theme="light"] {
  {% for key, value in brand_theme.css_vars_light.items %}
    {{ key }}: {{ value|safe }};
  {% endfor %}
  }
</style>
{% endif %}
{% if brand_theme and brand_theme.ui %}
<script>
  (function () {
    try {
      // Tema global del producto:
      // - Si el usuario eligió tema desde Menú → Tema, manda `localStorage['2j_theme']`.
      // - Si no hay preferencia del usuario, usamos la preferencia del club/equipo (`brand_theme.ui`).
      var key = "2j_theme";
      var stored = "";
      try { stored = (window.localStorage && window.localStorage.getItem(key)) || ""; } catch (e) {}
      // Default producto: oscuro. Evita contrastes malos en páginas que aún tienen estilos "dark-first".
      // IMPORTANTE: si el club/equipo fuerza `dark`, ignoramos `stored=light` para no romper contraste
      // (muchas pantallas aún no son compatibles al 100% con modo claro).
      var brandMode = ("{{ brand_theme.ui|default:'dark' }}").toString().trim().toLowerCase();
      if (!brandMode) brandMode = "dark";
      if (brandMode !== "light" && brandMode !== "hc" && brandMode !== "dark") brandMode = "dark";

      var storedMode = (stored || "").toString().trim().toLowerCase();
      if (storedMode !== "light" && storedMode !== "hc" && storedMode !== "dark") storedMode = "";

      var allowLight = false;
      try { allowLight = document.documentElement && document.documentElement.hasAttribute("data-allow-light-theme"); } catch (e) {}
      if (!allowLight && brandMode === "light") brandMode = "dark";
      if (!allowLight && storedMode === "light") storedMode = "dark";

      var forceDark = (brandMode === "dark");
      var mode = brandMode;
      if (!forceDark) {
        // Solo permitimos override cuando el club NO fuerza oscuro.
        mode = storedMode || brandMode;
      } else {
        // En oscuro forzado, permitimos como mucho "hc".
        mode = (storedMode === "hc") ? "hc" : "dark";
        // Limpia light guardado para evitar que vuelva el modo claro en otros dispositivos.
        if (storedMode && storedMode !== mode) {
          try { window.localStorage && window.localStorage.setItem(key, mode); } catch (e) {}
        }
      }
      if (mode === "dark") {
        document.documentElement.removeAttribute("data-theme");
      } else {
        document.documentElement.setAttribute("data-theme", mode);
      }

      // Helper global: permite toggles en cualquier página sin duplicar JS.
      window.__toggleUiTheme = function (next) {
        try {
          var current = (document.documentElement.getAttribute("data-theme") || "dark").toLowerCase();
          var target = next || (current === "light" ? "dark" : "light");
          if (target !== "light" && target !== "hc" && target !== "dark") target = "dark";
          if (!allowLight && target === "light") target = "dark";
          // Si el club fuerza oscuro, no permitimos pasar a "light" (solo hc o dark).
          if (forceDark && target === "light") target = "dark";
          if (target === "dark") {
            document.documentElement.removeAttribute("data-theme");
          } else {
            document.documentElement.setAttribute("data-theme", target);
          }
          try { window.localStorage && window.localStorage.setItem(key, target); } catch (e) {}
          return target;
        } catch (e) { return "dark"; }
      };

      // Auto-bind: cualquier botón con `data-ui-theme-toggle` alterna dark/light.
      document.addEventListener("DOMContentLoaded", function () {
        try {
          var nodes = document.querySelectorAll("[data-ui-theme-toggle]");
          if (!nodes || !nodes.length) return;
          nodes.forEach(function (node) {
            node.addEventListener("click", function (ev) {
              try { ev.preventDefault(); } catch (e) {}
              var desired = node.getAttribute("data-ui-theme-toggle") || "";
              var applied = window.__toggleUiTheme(desired || undefined);
              // Opcional: actualizar texto visible si el botón tiene data-ui-theme-label.
              try {
                var labelNode = node.querySelector("[data-ui-theme-label]");
                if (labelNode) labelNode.textContent = (applied === "light") ? "Claro" : "Oscuro";
              } catch (e) {}
            });
          });
        } catch (e) {}
      });
    } catch (e) {}
  })();
</script>
{% endif %}
<script>
  (function () {
    try {
      var root = document.documentElement;
      var setViewportVars = function () {
        try {
          var vv = window.visualViewport;
          var width = vv && vv.width ? vv.width : window.innerWidth;
          var height = vv && vv.height ? vv.height : window.innerHeight;
          root.style.setProperty('--app-vw', String(Math.max(1, Math.round(width))) + 'px');
          root.style.setProperty('--app-vh', String(Math.max(1, Math.round(height))) + 'px');
          root.style.setProperty('--app-dpr', String(window.devicePixelRatio || 1));
        } catch (e) {}
      };
      setViewportVars();
      window.addEventListener('resize', setViewportVars, { passive: true });
      window.addEventListener('orientationchange', function () { window.setTimeout(setViewportVars, 120); }, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setViewportVars, { passive: true });
        window.visualViewport.addEventListener('scroll', setViewportVars, { passive: true });
      }
      document.addEventListener('visibilitychange', function () { if (!document.hidden) setViewportVars(); });
    } catch (e) {}
  })();
</script>

<script>
  (function () {
    try {
      var clearKey = 'webstats:sw-reset:{{ static_build_id|default:"dev"|escapejs }}';
      if (window.sessionStorage && window.sessionStorage.getItem(clearKey) === '1') return;
      var markDone = function () {
        try { window.sessionStorage && window.sessionStorage.setItem(clearKey, '1'); } catch (e) {}
      };
      var reset = async function () {
        try {
          if ('serviceWorker' in navigator && typeof navigator.serviceWorker.getRegistrations === 'function') {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all((regs || []).map(function (reg) {
              try { return reg.unregister(); } catch (e) { return Promise.resolve(false); }
            }));
          }
        } catch (e) {}
        try {
          if ('caches' in window && typeof caches.keys === 'function') {
            var keys = await caches.keys();
            await Promise.all((keys || []).map(function (key) {
              key = String(key || '');
              if (!key || !key.startsWith('webstats-')) return Promise.resolve(false);
              try { return caches.delete(key); } catch (e) { return Promise.resolve(false); }
            }));
          }
        } catch (e) {}
        markDone();
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () { reset(); }, { once: true });
      } else {
        reset();
      }
    } catch (e) {}
  })();
</script>
<script>
  (function () {
    const launcherId = 'global-guard-fallback-launcher';
    const mountLauncher = function () {
      try {
        if (!document.body || document.getElementById(launcherId)) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.id = launcherId;
        btn.textContent = 'Ollana';
        btn.setAttribute('aria-label', 'Abrir Ollana');
        btn.style.position = 'fixed';
        btn.style.right = 'max(14px, env(safe-area-inset-right))';
        btn.style.bottom = 'max(14px, env(safe-area-inset-bottom))';
        btn.style.zIndex = '2147483647';
        btn.style.border = '1px solid rgba(250,204,21,0.42)';
        btn.style.borderRadius = '999px';
        btn.style.background = 'linear-gradient(135deg, #14532d, #22c55e 58%, #facc15 140%)';
        btn.style.color = '#f8fafc';
        btn.style.padding = '12px 16px';
        btn.style.fontFamily = 'var(--prod-font-ui, Avenir Next, Inter, Segoe UI, system-ui, sans-serif)';
        btn.style.fontSize = '12px';
        btn.style.fontWeight = '950';
        btn.style.letterSpacing = '.08em';
        btn.style.textTransform = 'uppercase';
        btn.style.boxShadow = '0 18px 48px rgba(20,83,45,.38)';
        btn.style.cursor = 'pointer';
        btn.style.pointerEvents = 'auto';
        btn.style.webkitAppearance = 'none';
        btn.style.appearance = 'none';
        btn.addEventListener('click', function () {
          try {
            const shell = document.getElementById('global-guard-widget-shell');
            const toggle = document.getElementById('global-guard-widget-toggle');
            const panel = document.getElementById('global-guard-widget-panel');
            if (shell && toggle) {
              shell.classList.add('is-open');
              shell.style.display = 'flex';
              shell.style.position = 'fixed';
              shell.style.right = 'max(14px, env(safe-area-inset-right))';
              shell.style.bottom = 'max(14px, env(safe-area-inset-bottom))';
              shell.style.zIndex = '2147483647';
              toggle.setAttribute('aria-expanded', 'true');
              if (panel) panel.style.display = 'flex';
              const input = document.getElementById('global-guard-chat-input');
              if (input && typeof input.focus === 'function') {
                window.setTimeout(() => { try { input.focus(); } catch (e) {} }, 80);
              }
              return;
            }
          } catch (e) {}
          try {
            const nextUrl = new URL("{% url 'system-guard-page' %}", window.location.origin);
            const current = new URL(window.location.href);
            const team = current.searchParams.get('team') || "{{ active_team.id|default:'' }}";
            const workspace = current.searchParams.get('workspace') || "{{ active_workspace.id|default:'' }}";
            if (team) nextUrl.searchParams.set('team', team);
            if (workspace) nextUrl.searchParams.set('workspace', workspace);
            window.location.href = nextUrl.pathname + nextUrl.search;
          } catch (e) {}
        });
        document.body.appendChild(btn);
      } catch (e) {}
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', mountLauncher, { once: true });
    } else {
      mountLauncher();
    }
  })();
</script>
<script>
  (function () {
    // Mantiene la sesión viva en WebView/PWA cuando el usuario está leyendo/edita sin hacer requests.
    // Evita que acciones críticas (Asignar tarea, Guardar pizarra, PDFs) redirijan a login tras minutos sin actividad.
    try {
      const ping = async () => {
        try {
          await fetch('/api/session/keepalive/', { credentials: 'include', cache: 'no-store', headers: { Accept: 'application/json' } });
        } catch (e) {}
      };
      // Ping inicial suave.
      window.setTimeout(() => { ping(); }, 15000);
      // Ping periódico.
      window.setInterval(() => { ping(); }, 6 * 60 * 1000);
      // Al volver a la app/pestaña.
      document.addEventListener('visibilitychange', () => { if (!document.hidden) ping(); });
    } catch (e) {}
  })();
</script>
{% endif %}
<script>
  (function () {
    if (!('serviceWorker' in navigator)) return;
    window.addEventListener('load', function () {
      navigator.serviceWorker.register("{% url 'pwa-sw' %}", { scope: "/" }).catch(function () {});
    });

{% if static_build_id %}
<script>
  (function () {
    try {
      var build = "{{ static_build_id|escapejs }}";
      if (!build) return;
      var buildKey = "2j_static_build_id";
      var refreshKey = "2j_cache_refresh_" + build;
      var previous = "";
      try { previous = window.localStorage && window.localStorage.getItem(buildKey) || ""; } catch (e) {}
      if (!previous || previous === build) {
        try { window.localStorage && window.localStorage.setItem(buildKey, build); } catch (e) {}
        return;
      }
      try {
        if (window.sessionStorage && window.sessionStorage.getItem(refreshKey)) {
          window.localStorage && window.localStorage.setItem(buildKey, build);
          return;
        }
        window.sessionStorage && window.sessionStorage.setItem(refreshKey, "1");
      } catch (e) {}
      var clearCaches = function () {
        if (!("caches" in window)) return Promise.resolve();
        return caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (key) {
            return key.indexOf("webstats-") === 0 ? caches.delete(key) : Promise.resolve(false);
          }));
        });
      };
      var unregisterWorkers = function () {
        if (!("serviceWorker" in navigator)) return Promise.resolve();
        return navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
        });
      };
      Promise.all([clearCaches(), unregisterWorkers()]).catch(function () {}).then(function () {
        try { window.localStorage && window.localStorage.setItem(buildKey, build); } catch (e) {}
        try {
          var url = new URL(window.location.href);
          url.searchParams.set("fresh", "1");
          window.location.replace(url.toString());
        } catch (e) {
          window.location.reload();
        }
      });
    } catch (e) {}
  })();
</script>
{% endif %}
