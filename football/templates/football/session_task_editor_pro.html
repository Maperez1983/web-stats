{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>{{ task.title }} · Editor Pro</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/editor-pro/tactical-editor.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <style>
      body {
        margin: 0;
        background: #07111f;
        color: #f8fafc;
        font-family: var(--prod-font-ui, "Avenir Next", "Inter", "Segoe UI", sans-serif);
        overflow: hidden;
      }
      .editor-lab-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 0.8rem;
        padding: 0.8rem;
        box-sizing: border-box;
      }
      .editor-lab-switcher {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin: 0 0 0.75rem;
        padding: 0.7rem 0.85rem;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px;
        background: rgba(4, 12, 24, 0.7);
        box-shadow: 0 18px 42px rgba(2, 6, 23, 0.16);
      }
      .editor-lab-switcher-copy {
        display: grid;
        gap: 0.16rem;
      }
      .editor-lab-switcher-copy strong {
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .editor-lab-switcher-copy span {
        color: rgba(226, 232, 240, 0.76);
        font-size: 0.78rem;
      }
      .editor-lab-switcher-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        justify-content: flex-end;
      }
      .editor-lab-switcher-actions .button[aria-current="page"] {
        border-color: rgba(34, 211, 238, 0.42);
        background: rgba(34, 211, 238, 0.16);
        color: #f8fafc;
      }
      .editor-lab-shell > #tactical-editor-root {
        min-height: 0;
      }
      .editor-lab-shell > #tactical-editor-root .te-app {
        height: calc(100dvh - 7rem);
        min-height: calc(100dvh - 7rem);
      }
      @media (max-width: 760px) {
        .editor-lab-switcher {
          flex-direction: column;
          align-items: stretch;
        }
        .editor-lab-switcher-actions {
          justify-content: stretch;
        }
        .editor-lab-switcher-actions .button,
        .editor-lab-switcher-actions span.button {
          flex: 1 1 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="editor-lab-shell">
      {% include 'football/includes/editor_lab_switcher.html' %}
      <div
        id="tactical-editor-root"
        data-document-url="{{ editor_document_api_url }}"
        data-detail-url="{{ detail_url }}"
        data-builder-url="{{ builder_url }}"
      ></div>
    </main>
    <script id="task-editor-pro-bootstrap" type="application/json">{{ document_payload_json|safe }}</script>
    <script type="module" src="{% static 'football/editor-pro/tactical-editor.js' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}"></script>
  </body>
</html>
