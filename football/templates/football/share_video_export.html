{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Vídeo · 2J</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/css/commercial.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    {% include 'football/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        background:
          radial-gradient(900px 380px at 10% -4%, rgba(34,211,238,0.16) 0%, rgba(34,211,238,0) 58%),
          linear-gradient(180deg, #020417 0%, #050b1c 100%);
        color: #f8fafc;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .page { max-width: 1100px; margin: 0 auto; padding: 1.2rem 1rem 2.5rem; }
      .head {
        display:flex;
        justify-content:space-between;
        gap:0.9rem;
        flex-wrap:wrap;
        align-items:flex-end;
        padding:1rem 1.05rem;
        border-radius:24px;
        border:1px solid rgba(145, 161, 185, 0.16);
        background:
          radial-gradient(720px 240px at 0% 0%, rgba(34,211,238,0.14) 0%, rgba(34,211,238,0) 56%),
          rgba(12, 20, 34, 0.9);
        box-shadow: 0 24px 54px rgba(0,0,0,0.24);
      }
      .head-copy { display:grid; gap:0.3rem; }
      .head-kicker { color:#67e8f9; font-size:0.72rem; font-weight:900; letter-spacing:0.18em; text-transform:uppercase; }
      .head h1 { margin:0; font-size:clamp(1.45rem, 2.8vw, 2.1rem); letter-spacing:-0.03em; text-transform:none; line-height:1.02; }
      .meta { color: rgba(226, 232, 240, 0.72); font-weight: 800; }
      .head-pills { display:flex; flex-wrap:wrap; gap:0.45rem; }
      .head-pill { display:inline-flex; align-items:center; justify-content:center; min-height:30px; padding:0 0.72rem; border-radius:999px; border:1px solid rgba(148,163,184,0.2); background:rgba(255,255,255,0.04); color:rgba(226,232,240,0.86); font-size:0.7rem; font-weight:900; letter-spacing:0.08em; text-transform:uppercase; }
      .card { margin-top: 1rem; background: rgba(12, 20, 34, 0.92); border: 1px solid rgba(145, 161, 185, 0.18); border-radius: 22px; box-shadow: 0 22px 52px rgba(0,0,0,0.28); padding: 0.95rem; }
      .button { border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color:#f3f7ff; padding:0.72rem 0.98rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease; }
      .button.primary { background: linear-gradient(135deg, #22d3ee, #67e8f9); border:none; color:#03253c; }
      .button:hover { transform: translateY(-1px); border-color: rgba(103,232,249,0.34); box-shadow: 0 16px 30px rgba(8,15,30,0.22); }
      video { width: 100%; height: auto; border-radius: 18px; border: 1px solid rgba(148,163,184,0.18); background: rgba(0,0,0,0.22); }
    </style>
  </head>
  <body class="prod-commercial">
    <main class="page">
      <div class="head">
        <div class="head-copy">
          <div class="head-kicker">Export compartido</div>
          <h1>{{ export.title|default:"Vídeo" }}</h1>
          <div class="meta">2J · Video Studio</div>
          <div class="head-pills">
            <span class="head-pill">Streaming</span>
            <span class="head-pill">MP4</span>
            <span class="head-pill">Compartir</span>
          </div>
        </div>
        <div style="display:flex; gap:0.45rem; flex-wrap:wrap;">
          <a class="button primary" href="{{ stream_url }}">Abrir</a>
          <a class="button" href="{{ stream_url }}?download=1" download>Descargar MP4</a>
        </div>
      </div>

      <section class="card">
        <video controls playsinline preload="metadata">
          <source src="{{ stream_url }}" />
        </video>
        <div class="meta" style="margin-top:0.65rem;">Si el vídeo tarda, espera unos segundos: la reproducción usa streaming.</div>
      </section>
    </main>
  </body>
</html>
