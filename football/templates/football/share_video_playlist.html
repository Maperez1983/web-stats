{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Lista de clips · 2J</title>
    <link rel="stylesheet" href="{% static 'football/css/product_system.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    <link rel="stylesheet" href="{% static 'football/css/commercial.css' %}{% if static_build_id %}?v={{ static_build_id|urlencode }}{% endif %}" />
    {% include 'football/pwa_head.html' %}
    <style>
      body { margin:0; background: linear-gradient(180deg, #020417 0%, #050b1c 100%); color:#f8fafc; font-family: Inter, system-ui, sans-serif; }
      .page { max-width: 1200px; margin:0 auto; padding: 1.1rem; }
      .card { background: rgba(12, 20, 34, 0.92); border: 1px solid rgba(145, 161, 185, 0.18); border-radius: 22px; box-shadow: 0 22px 52px rgba(0,0,0,0.28); padding: 0.95rem; }
      .grid { display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 1rem; align-items:start; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
      h1 { margin:0; font-size:1.05rem; letter-spacing:0.08em; text-transform:uppercase; }
      .meta { color: rgba(226,232,240,0.72); font-weight:800; margin-top:0.25rem; }
      .button { border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color:#f3f7ff; padding:0.72rem 0.98rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; font-size:0.72rem; cursor:pointer; }
      .button.primary { background: linear-gradient(135deg, #22d3ee, #67e8f9); border:none; color:#03253c; }
      .row { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; padding:0.65rem 0.75rem; border-radius: 16px; border:1px solid rgba(148,163,184,0.14); background: rgba(255,255,255,0.03); }
      .row strong { font-weight:900; }
      .row small { color: rgba(226,232,240,0.7); font-weight:800; }
      .list { display:grid; gap:0.45rem; margin-top:0.6rem; }
      .stage { position:relative; width:100%; border-radius: 18px; overflow:hidden; border: 1px solid rgba(148,163,184,0.18); background: rgba(0,0,0,0.22); }
      video { display:block; width:100%; height:auto; }
      .status { margin-top:0.55rem; color: rgba(226,232,240,0.72); font-weight:800; }
    </style>
  </head>
  <body class="prod-commercial">
    <main class="page">
      <div class="card" style="margin-bottom:1rem;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:0.8rem; flex-wrap:wrap;">
          <div>
            <h1>Lista de clips</h1>
            <div class="meta">{{ video.title|default:"Vídeo" }}</div>
          </div>
          <div style="display:flex; gap:0.55rem; flex-wrap:wrap;">
            <button type="button" class="button primary" id="pl-playall">Play lista</button>
            <button type="button" class="button" id="pl-stop">Stop</button>
          </div>
        </div>
      </div>

      <div class="grid">
        <section class="card">
          <div class="stage">
            <video id="pl-video" controls preload="metadata" playsinline crossorigin="anonymous">
              <source src="{{ video_stream_url }}" />
            </video>
          </div>
          <div class="status" id="pl-status">Listo.</div>
        </section>
        <aside class="card">
          <div class="meta" style="font-weight:900; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.35rem;">Clips</div>
          <div class="list" id="pl-list"></div>
        </aside>
      </div>

      <script>
        (function () {
          const clips = {{ clips_json|safe }};
          const video = document.getElementById('pl-video');
          const list = document.getElementById('pl-list');
          const status = document.getElementById('pl-status');
          const btnPlayAll = document.getElementById('pl-playall');
          const btnStop = document.getElementById('pl-stop');
          const safeText = (v, f='') => String(v ?? '').trim() || f;
          const fmt = (s) => {
            const n = Number(s) || 0;
            const m = Math.floor(n / 60);
            const r = Math.floor(n % 60);
            return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
          };
          const setStatus = (t) => { if (status) status.textContent = safeText(t,''); };
          let active = false;
          let idx = 0;
          let busy = false;

          const render = () => {
            if (!list) return;
            const rows = (Array.isArray(clips) ? clips : []).slice(0, 120).map((c, i) => {
              const title = safeText(c?.title, `Clip ${i+1}`);
              const a = Number(c?.in_s) || 0;
              const b = Number(c?.out_s) || 0;
              const label = `${fmt(a)} → ${fmt(b || a)}`;
              const notes = safeText(c?.notes, '');
              return `
                <div class="row">
                  <div style="display:flex; flex-direction:column; gap:0.05rem; min-width:0;">
                    <strong style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${title}</strong>
                    <small>${label}${notes ? ' · ' + notes.slice(0,60) : ''}</small>
                  </div>
                  <div style="display:flex; gap:0.35rem; flex-wrap:wrap;">
                    <button type="button" class="button" data-go="${i}">Ir</button>
                  </div>
                </div>
              `;
            }).join('');
            list.innerHTML = rows || '<div class="meta">Sin clips.</div>';
            Array.from(list.querySelectorAll('[data-go]')).forEach((btn) => {
              btn.addEventListener('click', async () => {
                const i = Number(btn.getAttribute('data-go') || 0) || 0;
                const c = clips[i];
                if (!c) return;
                active = false;
                idx = i;
                try { video.currentTime = Math.max(0, Number(c.in_s) || 0); } catch(e) {}
                try { await video.play(); } catch(e) {}
                setStatus(`Clip ${i+1}/${clips.length}`);
              });
            });
          };
          render();

          const playIdx = async (i) => {
            const c = clips[i];
            if (!c) return;
            idx = i;
            try { video.currentTime = Math.max(0, Number(c.in_s) || 0); } catch(e) {}
            try { await video.play(); } catch(e) {}
            setStatus(`Lista ${i+1}/${clips.length}`);
          };
          btnPlayAll?.addEventListener('click', async () => {
            if (!clips?.length) return;
            active = true;
            await playIdx(0);
          });
          btnStop?.addEventListener('click', () => {
            active = false;
            try { video.pause(); } catch(e) {}
            setStatus('Parado.');
          });
          video?.addEventListener('timeupdate', () => {
            if (!active || busy) return;
            const c = clips[idx];
            if (!c) return;
            const end = Number(c.out_s) || 0;
            if (!end) return;
            const now = Number(video.currentTime) || 0;
            if (now >= end - 0.03) {
              busy = true;
              const next = idx + 1;
              if (next >= clips.length) {
                active = false;
                setStatus('Lista finalizada.');
                busy = false;
                return;
              }
              playIdx(next).finally(() => { setTimeout(() => { busy = false; }, 120); });
            }
          });
        })();
      </script>
    </main>
  </body>
</html>
