services:
  - type: web
    name: web-stats
    runtime: python
    plan: standard
    branch: main
    buildCommand: ./build.sh
    startCommand: ./scripts/start_with_ollama.sh
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: GUNICORN_WORKERS
        value: "2"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_KEEPALIVE
        value: "5"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "30"
      # Arranque rápido: `collectstatic` ya se hace en build (`build.sh`).
      - key: RUN_COLLECTSTATIC
        value: "false"
      - key: INSTALL_OLLAMA
        value: "true"
      - key: ENABLE_OLLAMA
        value: "true"
      - key: OLLAMA_MODEL
        value: "qwen3:1.7b"
      - key: AI_TRAINER_LOCAL_LLM_MODEL
        value: "qwen3:1.7b"
      - key: AI_TRAINER_LOCAL_LLM_ENABLED
        value: "true"
      - key: AI_TRAINER_OLLAMA_URL
        value: "http://127.0.0.1:11434"
      - key: AI_TRAINER_LOCAL_VISION_MODELS
        value: "llama3.2-vision,qwen2.5-vl,minicpm-v"
      - key: OLLAMA_VISION_MODELS
        value: "llama3.2-vision,qwen2.5-vl,minicpm-v"
      - key: OLLAMA_IMAGE_ANALYSIS_MODEL
        value: "llama3.2-vision"
      # Render expone el hostname externo en esta variable; `webstats/settings.py`
      # lo usa para completar `ALLOWED_HOSTS` y CSRF trusted origins.
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false
      # Obligatorios en producción
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: "false"
      # Recomendación: mantener instalado Chromium durante el build si usas previews HD.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      # Opcional: instala chromium en build (coste CPU/tiempo). Desactivado por defecto.
      - key: INSTALL_PLAYWRIGHT_BROWSERS
        value: "true"
      # Fallback: si el browser no quedó en caché tras el build, Render lo reinstala al arrancar.
      - key: INSTALL_PLAYWRIGHT_BROWSERS_AT_RUNTIME
        value: "true"
      # Seguridad: desactiva fallback monoclub en producción si no lo necesitas.
      - key: ALLOW_SINGLE_CLUB_FALLBACK
        value: "false"
  - type: worker
    name: web-stats-ollana-operator
    runtime: python
    plan: standard
    branch: main
    buildCommand: ./build.sh
    startCommand: ./scripts/start_ollana_operator_worker.sh
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RUN_MIGRATIONS
        value: "false"
      - key: OLLANA_OPERATOR_ENABLED
        value: "true"
      - key: OLLANA_OPERATOR_WORKSPACE_ID
        sync: false
      - key: OLLANA_OPERATOR_ACTOR_ID
        sync: false
      - key: OLLANA_OPERATOR_SLEEP_SECONDS
        value: "30"
      - key: OLLANA_OPERATOR_MAX_RUNTIME_SECONDS
        value: "0"
      - key: OLLANA_OPERATOR_FORCE
        value: "true"
      - key: OLLANA_ADMIN_AUTONOMY_ENABLE_RELEASES
        value: "false"
      - key: OLLANA_RENDER_API_KEY
        sync: false
      - key: AI_TRAINER_LOCAL_VISION_MODELS
        value: "llama3.2-vision,qwen2.5-vl,minicpm-v"
      - key: OLLAMA_VISION_MODELS
        value: "llama3.2-vision,qwen2.5-vl,minicpm-v"
      - key: OLLAMA_IMAGE_ANALYSIS_MODEL
        value: "llama3.2-vision"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: "false"
      # Fallback: si el browser no quedó en caché tras el build, Render lo reinstala al arrancar.
      - key: INSTALL_PLAYWRIGHT_BROWSERS_AT_RUNTIME
        value: "true"
