<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SegundaJugada</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .meta {
        opacity: 0.8;
        margin-top: 8px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">SegundaJugada</div>
      <div class="meta">Cargando…</div>
    </div>
  </body>
</html>
